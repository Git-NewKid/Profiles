#! ============================================================
#! AppsFlyer SDK 拦截规则
#! 功能：拦截归因跟踪、应用内事件上报、配置获取等
#! 来源参考：AdGuard Spyware Filter, 1Hosts
#! ============================================================

# --- 核心跟踪与归因 ---
# 拦截应用内事件上报 (含随机前缀，如 wxhepz-inapps)
DOMAIN-SUFFIX,inapps.appsflyersdk.com,REJECT
# 拦截归因/跟踪接口
DOMAIN-SUFFIX,attr.appsflyersdk.com,REJECT
DOMAIN-SUFFIX,track.appsflyersdk.com,REJECT
DOMAIN-SUFFIX,t.appsflyersdk.com,REJECT
# 拦截事件上报
DOMAIN-SUFFIX,events.appsflyersdk.com,REJECT
# 拦截启动事件
DOMAIN-SUFFIX,launches.appsflyersdk.com,REJECT
# 拦截转化数据
DOMAIN-SUFFIX,conversions.appsflyersdk.com,REJECT
# 拦截注册事件
DOMAIN-SUFFIX,register.appsflyersdk.com,REJECT

# --- 配置与设置 ---
# 拦截 SDK 配置下发 (含随机前缀，如 roovza-cdn-settings)
DOMAIN-SUFFIX,cdn-settings.appsflyersdk.com,REJECT
# 拦截动态配置 API
DOMAIN-SUFFIX,dynamic-config-api.appsflyersdk.com,REJECT
DOMAIN-SUFFIX,dynamic-report-api.appsflyersdk.com,REJECT

# --- SDK 功能模块 ---
# 拦截 Deep Linking 服务
DOMAIN-SUFFIX,dlsdk.appsflyersdk.com,REJECT
DOMAIN-SUFFIX,dls2s.appsflyersdk.com,REJECT
DOMAIN-SUFFIX,onelink.appsflyersdk.com,REJECT
# 拦截 SKAdNetwork 相关
DOMAIN-SUFFIX,skadsdk.appsflyersdk.com,REJECT
DOMAIN-SUFFIX,skadsdkless.appsflyersdk.com,REJECT
# 拦截其他 SDK 服务
DOMAIN-SUFFIX,gcdsdk.appsflyersdk.com,REJECT
DOMAIN-SUFFIX,monitorsdk.appsflyersdk.com,REJECT
DOMAIN-SUFFIX,sdk-services.appsflyersdk.com,REJECT
DOMAIN-SUFFIX,sdk.appsflyersdk.com,REJECT

# --- 隐私与高级功能 ---
# 拦截 Privacy Sandbox 相关
DOMAIN-SUFFIX,privacy-sandbox.appsflyersdk.com,REJECT
# 拦截 Web SDK (用于网页跟踪)
DOMAIN-SUFFIX,websdk.appsflyersdk.com,REJECT
# 拦截广告展示/曝光追踪
DOMAIN-SUFFIX,impression.appsflyersdk.com,REJECT
DOMAIN-SUFFIX,banner.appsflyersdk.com,REJECT

# --- API 接口 (谨慎拦截) ---
# 拦截通用 API 接口 (可能影响部分 App 网络功能，如遇问题可注释下行)
DOMAIN-SUFFIX,api.appsflyersdk.com,REJECT
DOMAIN-SUFFIX,api2.appsflyersdk.com,REJECT

#! ============================================================
